<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bioinformatics Company</title>

  <meta name="title" content="Bioinformatics Company" />
  <meta name="description" content="A U.S.-based R&D company advancing in silico discovery across immunology, proteomics, genomics, peptide science, molecular medicine, longevity, and fundamental biomedical research." />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://bioinformaticscompany.com/" />
  <meta property="og:title" content="Bioinformatics Company" />
  <meta property="og:description" content="A U.S.-based R&D company advancing in silico discovery across immunology, proteomics, genomics, peptide science, molecular medicine, longevity, and fundamental biomedical research." />
  <meta property="og:image" content="https://bioinformaticscompany.com/4FFE83C6-687A-4086-8CAF-62DDEC590FA6.png" />

  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://bioinformaticscompany.com/" />
  <meta property="twitter:title" content="Bioinformatics Company" />
  <meta property="twitter:description" content="A U.S.-based R&D company advancing in silico discovery across immunology, proteomics, genomics, peptide science, molecular medicine, longevity, and fundamental biomedical research." />
  <meta property="twitter:image" content="https://bioinformaticscompany.com/4FFE83C6-687A-4086-8CAF-62DDEC590FA6.png" />

  <style>
    :root {
      /* Color Palette */
      --page-bg: #f9fafb;
      --card-bg: #ffffff;
      --ink-dark: #111827;
      --ink-muted: #4b5563;
      --border-light: #e5e7eb;
      
      /* Shadows */
      --shadow-premium: 0 20px 40px -10px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
    }

    * { 
      box-sizing: border-box; 
      margin: 0;
      padding: 0;
    }

    html, body {
      background-color: var(--page-bg);
      color: var(--ink-dark);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* Fixed Layout: Allows natural scrolling on short screens */
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: clamp(1.5rem, 4vw, 3rem);
    }

    /* Main Card Layout */
    main {
      background: var(--card-bg);
      width: 100%;
      max-width: 1100px;
      margin: auto; /* Centers the card vertically and horizontally */
      border: 1px solid var(--border-light);
      border-radius: 16px;
      box-shadow: var(--shadow-premium);
      padding: clamp(2rem, 5vw, 4.5rem) clamp(1rem, 4vw, 3.5rem);
      text-align: center;
      
      /* Subtle entry animation */
      opacity: 0;
      transform: translateY(15px);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Typography: Header */
    .name {
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.1;
      font-weight: 300;
      letter-spacing: -0.03em;
      margin-bottom: clamp(1.5rem, 3vw, 2.5rem);
    }

    .name span {
      display: inline-block;
    }

    .name span:last-child {
      font-weight: 400;
    }

    /* Image / Diagram Container */
    .figure {
      width: 100%;
      max-width: 900px;
      margin: 0 auto clamp(1.5rem, 4vw, 3rem);
      padding: 1rem;
      border: 1px solid var(--border-light);
      border-radius: 8px;
    }

    .figure img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
    }

    /* Typography: Description */
    .description {
      width: 100%;
      max-width: 850px;
      margin: 0 auto;
      color: var(--ink-muted);
      font-size: clamp(1.05rem, 2vw, 1.25rem);
      line-height: 1.6;
      font-weight: 400;
    }

    /* Animations */
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile-Specific Adjustments */
    @media (max-width: 768px) {
      body {
        /* Increased top and bottom padding specifically for mobile devices */
        padding: 2.5rem 1rem; 
      }
      main {
        border-radius: 12px;
        padding: 2rem 1.25rem; 
      }
      .name {
        letter-spacing: -0.04em;
      }
      .figure {
        padding: 0;
        border: none; 
        margin-bottom: 1.5rem;
      }
      .description {
        font-size: 1.1rem; 
      }
    }
  </style>
</head>
<body>

  <main aria-label="Bioinformatics company landing page">
    <h1 class="name">
      <span>BIOINFORMATICS</span> <span>COMPANY</span>
    </h1>

    <div class="figure">
      <img src="4FFE83C6-687A-4086-8CAF-62DDEC590FA6.png" alt="Scientific multi-omics illustration with proteomics dynamics, genomic pathways, and predictive modeling" />
    </div>

    <p class="description">
      A U.S.-based R&D company advancing in silico discovery across immunology, proteomics, genomics, peptide science, molecular medicine, longevity, and fundamental biomedical research through AI-driven modeling and Web3-native scientific infrastructure.
    </p>
  </main>

</body>
</html>
