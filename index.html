<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bioinformatics company</title>
  <style>
    :root {
      --bg: #ffffff;
      --ink: #171717;
      --soft-ink: #30353a;
      --muted: #4b535b;
      --hairline: rgba(18, 22, 26, 0.085);
      --hairline-strong: rgba(18, 22, 26, 0.14);
      --shadow: 0 30px 90px rgba(18, 22, 26, 0.085), 0 2px 14px rgba(18, 22, 26, 0.05);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(18px, 4vw, 46px) clamp(14px, 3vw, 34px);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    main {
      width: min(1180px, 100%);
      text-align: center;
      background: #fff;
      border: 1px solid var(--hairline);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: clamp(34px, 5vw, 64px) clamp(18px, 4.6vw, 64px) clamp(34px, 4.6vw, 58px);
    }

    .name {
      margin: 0 auto;
      color: var(--ink);
      font-size: clamp(48px, 7.6vw, 54px);
      line-height: 0.92;
      font-weight: 300;
      letter-spacing: 0.04em;
      max-width: 980px;
      text-wrap: balance;
    }

    .name span {
      display: inline-block;
    }

    .name span:last-child {
      font-weight: 250;
      color: #242424;
    }

    .figure {
      width: min(1010px, 100%);
      margin: clamp(30px, 3.9vw, 48px) auto 0;
      padding: clamp(3px, 0.7vw, 8px);
      border-top: 1px solid transparent;
    }

    .figure img {
      display: block;
      width: 100%;
      height: auto;
      border: 0;
    }

    .description {
      margin: clamp(26px, 3.5vw, 42px) auto 0;
      max-width: 1024px;
      color: var(--muted);
      font-size: clamp(18px, 2.03vw, 26px);
      line-height: 1.48;
      letter-spacing: -0.026em;
      font-weight: 300;
      text-wrap: balance;
    }

    .description strong {
      color: var(--soft-ink);
      font-weight: 450;
      letter-spacing: -0.022em;
    }

    .description em {
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      color: #24282c;
      letter-spacing: -0.01em;
    }

    @media (max-width: 760px) {
      body { padding: 12px; }
      main {
        border-radius: 11px;
        padding: 32px 14px 30px;
        box-shadow: 0 18px 52px rgba(18, 22, 26, 0.075);
      }
      .name {
        font-size: clamp(40px, 12.6vw, 62px);
        letter-spacing: -0.067em;
      }
      .figure { margin-top: 24px; }
      .description {
        margin-top: 24px;
        max-width: 33ch;
        font-size: 17px;
        line-height: 1.52;
      }
    }
  </style>
</head>
<body>
  <main aria-label="bioinformatics company landing page">
    <h1 class="name"><span>BIOINFORMATICS</span> <span>COMPANY</span></h1>

    <div class="figure">
      <img src="4FFE83C6-687A-4086-8CAF-62DDEC590FA6.png" alt="Scientific multi-omics illustration with proteomics dynamics, genomic pathways, and predictive modeling" />
    </div>

    <p class="description"><strong>A U.S.-based R&D company advancing in silico discovery across immunology, proteomics, genomics, peptide science, molecular medicine, longevity, and fundamental biomedical research through AI-driven modeling and Web3-native scientific infrastructure.</p>

  </main>
</body>
</html>
